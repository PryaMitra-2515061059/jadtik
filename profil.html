            <li>
                <a href="laboratorium.html">
                    <i class="fas fa-flask"></i>

                </a>

            </li>

                </button>

                <h2>Profil Pengguna</h2>

            </div>

        </div>

    <div class="profile-card">

        <div class="profile-image">

            <i
            class="fas fa-user-circle">
            </i>

        </div>

        <h3 id="namaProfil">

        Administrator

        </h3>

        <p id="emailProfil">

        admin@jadtik.com

        </p>

        <hr>

        <div class="profile-info">

            <p>
                <strong>Role :</strong>
                Admin
            </p>

            <p>
                <strong>Status :</strong>
                Aktif
            </p>

        </div>

        <div class="profile-actions">

            <button
            class="btn-delete"
            onclick="logout()">

                Logout

            </button>

        </div>

    <footer class="footer">

        © 2026 JadTik
